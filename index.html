<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Studio Listening Pro</title>
    <!-- ① 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 🍎 极简配色系统与液态玻璃变量 */
        :root {
            --bg: #F5F5F7;
            --surface: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-blur: blur(28px);
            --text-main: #1D1D1F;
            --text-sub: #86868B;
            --border: rgba(0, 0, 0, 0.05);
            --blue: #007AFF;
            --green: #34C759;
            --orange: #FF9500;
            --red: #FF3B30;
            --hover-bg: rgba(255, 255, 255, 0.5);
            
            /* 液态玻璃 (浅色) */
            --liquid-bg: rgba(255, 255, 255, 0.65);
            --liquid-border: rgba(255, 255, 255, 0.9);
            --liquid-shadow: 0 16px 40px rgba(0, 0, 0, 0.08), 
                             inset 0 1px 1px rgba(255, 255, 255, 0.8),
                             inset 0 -1px 1px rgba(0, 0, 0, 0.02);
                             
            --shadow: 0 12px 40px rgba(0, 0, 0, 0.06);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* 🍎 升级版 VisionOS 风格深色模式 */
        .dark-theme {
            --bg: #050505;
            --surface: rgba(22, 22, 24, 0.55);
            --liquid-bg: rgba(24, 24, 28, 0.72);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #a1a1aa;
            --border: rgba(255, 255, 255, 0.08);
            --blue: #0A84FF;
            --green: #30D158;
            --orange: #FF9F0A;
            --red: #FF453A;
            --hover-bg: rgba(255, 255, 255, 0.1);
            
            --liquid-border: rgba(255, 255, 255, 0.15);
            --liquid-shadow: 0 20px 60px rgba(0, 0, 0, 0.55), 
                             inset 0 1px 1px rgba(255, 255, 255, 0.15),
                             inset 0 -1px 1px rgba(0, 0, 0, 0.2);
                             
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.55);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100dvh;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- 🍎 背景：温暖 Mesh Gradient 与 呼吸气泡 --- */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -2;
            background-color: #fdfbfb;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 228, 214, 0.8) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(226, 234, 255, 0.8) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 241, 219, 0.8) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(253, 233, 244, 0.8) 0px, transparent 50%);
            transition: 0.8s ease;
        }
        .dark-theme .mesh-bg {
            background-color: #0d0f12;
            background-image: 
                radial-gradient(at 0% 0%, rgba(40, 30, 20, 0.6) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(20, 30, 50, 0.6) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(30, 20, 30, 0.6) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(20, 30, 30, 0.6) 0px, transparent 50%);
        }
        
        .bubbles-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; overflow: hidden; pointer-events: none; }
        .bubble {
            position: absolute; bottom: -100px;
            background: var(--surface); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border); box-shadow: var(--shadow);
            border-radius: 50px; padding: 12px 28px;
            color: var(--text-sub); font-size: 14px; font-weight: 500; letter-spacing: 1px;
            animation: float-up linear infinite; opacity: 0;
        }
        @keyframes float-up {
            0% { transform: translateY(0) rotate(-5deg) scale(0.9); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(15deg) scale(1.1); opacity: 0; }
        }

        /* =========================================
           🍎 首页：高级视频库 (Home Screen)
           ========================================= */
        .home-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: row; 
            z-index: 100; background: transparent; 
            transition: opacity 0.5s ease, visibility 0.5s ease, transform 0.5s ease;
            overflow: hidden;
        }
        .home-screen.hidden { opacity: 0; visibility: hidden; transform: scale(0.98); }
        
        /* 左侧菜单栏 (Sidebar) */
        .app-sidebar {
            width: 260px; flex-shrink: 0;
            background: var(--surface);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            padding: 40px 20px; z-index: 10;
        }
        .app-brand { display: flex; align-items: center; gap: 12px; font-size: 20px; font-weight: 800; color: var(--text-main); margin-bottom: 40px; padding: 0 12px; }
        .app-brand svg { width: 28px; height: 28px; fill: var(--blue); }
        
        .app-nav { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px; border-radius: 16px;
            font-size: 15px; font-weight: 600; color: var(--text-sub);
            cursor: pointer; transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        .nav-item svg { width: 20px; height: 20px; fill: currentColor; }
        .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--text-main); }
        .dark-theme .nav-item:hover { background: rgba(255,255,255,0.08); }
        .nav-item.active { background: rgba(0, 122, 255, 0.1); color: var(--blue); }
        .dark-theme .nav-item.active { background: rgba(10, 132, 255, 0.15); color: var(--blue); }
        
        .sidebar-bottom { margin-top: auto; border-top: 1px solid var(--border); padding-top: 16px; }

        /* 主内容区 */
        .home-main {
            flex: 1; overflow-y: auto; scroll-behavior: smooth;
            padding: 60px 40px; display: flex; flex-direction: column; align-items: center;
        }
        
        .home-content-wrapper { max-width: 1200px; width: 100%; display: flex; flex-direction: column; gap: 32px; }

        .home-header { display: flex; justify-content: space-between; align-items: flex-end; width: 100%; border-bottom: 1px solid var(--border); padding-bottom: 20px;}
        .header-left { display: flex; flex-direction: column; gap: 16px; flex: 1; }
        .home-title { font-size: 40px; font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
        
        .mobile-theme-btn { display: none; }

        /* 新增：搜索框 */
        .search-box { width: 100%; max-width: 600px; position: relative; margin-top: 8px; }
        .search-box input {
            width: 100%; height: 50px; border: 1px solid var(--glass-border); outline: none;
            border-radius: 18px; padding: 0 20px 0 48px; font-size: 16px; font-weight: 500;
            background: var(--surface); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            color: var(--text-main); box-shadow: var(--shadow); transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; fill: var(--text-sub); }

        /* 过滤栏 Filters */
        .filter-bar { 
            display: flex; gap: 16px; flex-wrap: wrap; 
            background: var(--surface); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            padding: 16px; border-radius: 20px; border: 1px solid var(--glass-border); box-shadow: var(--shadow);
            transition: all 0.3s;
        }
        .filter-group { display: flex; align-items: center; gap: 12px; }
        .filter-label { font-size: 13px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.5px; }
        .filter-select {
            appearance: none; background: rgba(0,0,0,0.04); border: 1px solid transparent; 
            padding: 8px 32px 8px 16px; border-radius: 12px; font-size: 14px; font-weight: 600; color: var(--text-main);
            cursor: pointer; outline: none; transition: 0.2s;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2386868B%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.4-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 12px top 50%; background-size: 10px auto;
        }
        .dark-theme .filter-select { background-color: rgba(255,255,255,0.08); background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238E8E93%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.4-12.8z%22%2F%3E%3C%2Fsvg%3E"); }
        .filter-select:hover { background-color: rgba(0,0,0,0.08); }
        .dark-theme .filter-select:hover { background-color: rgba(255,255,255,0.15); }
        .filter-divider { width: 1px; height: 24px; background: var(--border); margin: 0 8px; }

        /* --- 🍎 Netflix / Apple TV 风格分类滚动区 --- */
        .category-section { margin-bottom: 40px; }
        .category-header { font-size: 22px; font-weight: 700; color: var(--text-main); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end;}
        .row-scroll {
            display: flex; overflow-x: auto; gap: 24px; padding-bottom: 24px; margin-bottom: -12px;
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        }
        .row-scroll::-webkit-scrollbar { height: 6px; }
        .row-scroll::-webkit-scrollbar-track { background: transparent; }
        .row-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        .row-scroll .video-card { flex: 0 0 320px; scroll-snap-align: start; }

        /* --- 🍎 标准化视频卡片 UI --- */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 32px; width: 100%; }
        
        .video-card {
            background: var(--surface); border: 1px solid var(--glass-border); border-radius: 24px;
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            overflow: hidden; cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
            box-shadow: var(--shadow); position: relative; display: flex; flex-direction: column;
        }
        /* 提升：VisionOS 风格边缘高光 */
        .dark-theme .video-card::before {
            content: ''; position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
            background: linear-gradient(180deg, rgba(255,255,255,0.08), transparent 25%);
            z-index: 2;
        }
        
        .video-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); border-color: var(--blue); }
        .video-card:active { transform: translateY(-2px) scale(0.98); }
        
        /* 新增：收藏按钮 */
        .favorite-btn {
            position: absolute; top: 12px; left: 12px; width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 5;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s;
        }
        .favorite-btn svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; transition: 0.3s; }
        .favorite-btn:hover { background: rgba(0,0,0,0.6); transform: scale(1.1); }
        .favorite-btn.active svg { fill: var(--red); stroke: var(--red); }

        /* 1. 顶部：媒体区域 (占比大) */
        .card-top { 
            position: relative; aspect-ratio: 16/9; background: #e0e0e0; 
            background-size: cover; background-position: center; border-bottom: 1px solid var(--border);
            z-index: 1;
        }
        .card-creator {
            position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.6);
            color: #fff; font-size: 13px; font-weight: 600; padding: 6px 10px; border-radius: 12px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; gap: 6px;
        }
        .card-duration {
            position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.7);
            color: #fff; font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 8px;
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); letter-spacing: 0.5px;
        }

        /* 2. 中部：标题与评分 */
        .card-middle { 
            display: flex; justify-content: space-between; align-items: flex-start; 
            padding: 20px 20px 12px 20px; gap: 12px; z-index: 1;
        }
        .card-ep-group { display: flex; flex-direction: column; gap: 4px; }
        .card-ep { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-main); line-height: 1.1; }
        .card-title { font-size: 14px; font-weight: 500; color: var(--text-sub); display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .card-rating { display: flex; gap: 2px; align-items: center; }
        .star { width: 18px; height: 18px; }
        .star.filled { fill: var(--orange); }
        .star.empty { fill: var(--border); }
        .dark-theme .star.empty { fill: rgba(255,255,255,0.2); }

        /* 3. 底部：元数据标签 */
        .card-bottom { padding: 0 20px 20px 20px; display: flex; flex-direction: column; gap: 16px; z-index: 1; }
        .card-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .card-tag { 
            padding: 6px 12px; background: rgba(0, 122, 255, 0.08); color: var(--blue); 
            border-radius: 99px; font-size: 13px; font-weight: 600; 
        }
        .dark-theme .card-tag { background: rgba(10, 132, 255, 0.15); }
        
        .card-meta { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed var(--border); padding-top: 12px; }
        .card-accent { font-size: 13px; font-weight: 600; color: var(--text-main); display: flex; align-items: center; gap: 4px;}
        .card-date { font-size: 12px; color: var(--text-sub); }

        .card-progress {
            position: absolute; bottom: 0; left: 0; height: 4px; background: var(--green);
            border-radius: 0 0 0 24px; transition: width 0.3s; z-index: 3;
        }

        /* 状态覆盖层 */
        .card-overlay {
            position: absolute; inset: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(4px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s; z-index: 10;
        }
        .dark-theme .card-overlay { background: rgba(0,0,0,0.7); }
        .video-card.loading .card-overlay { opacity: 1; pointer-events: all; }
        .spinner {
            width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--blue);
            border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 侧边栏本地上传区域 */
        .sidebar-upload {
            display: flex; flex-direction: column; gap: 4px; padding-top: 24px; margin-top: 24px;
            border-top: 1px solid var(--border);
        }
        .upload-label { font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; padding-left: 12px; margin-bottom: 8px; }
        .upload-item { position: relative; }
        .upload-item.ready { color: var(--green); background: rgba(52, 199, 89, 0.1); }
        .dark-theme .upload-item.ready { background: rgba(52, 199, 89, 0.15); }
        .upload-item.ready svg { fill: var(--green); }
        .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        
        .launch-btn {
            background: var(--text-main); color: var(--bg); border: none; padding: 12px 24px;
            border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.3s;
            opacity: 0.4; pointer-events: none; width: 100%; margin-top: 8px; text-align: center;
        }
        .launch-btn.active { opacity: 1; pointer-events: auto; }
        .launch-btn.active:hover { transform: translateY(-2px); }

        /* 空状态 */
        .empty-state {
            grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 80px 20px; text-align: center; color: var(--text-sub);
        }
        .empty-state svg { width: 48px; height: 48px; fill: var(--border); margin-bottom: 16px; }
        .empty-state h3 { font-size: 18px; color: var(--text-main); margin-bottom: 8px; }

        /* =========================================
           🍎 主工作区 (Workspace)
           ========================================= */
        .workspace {
            display: flex; width: 100%; max-width: 1600px; height: 100dvh;
            padding: 32px; gap: 32px; opacity: 0; visibility: hidden; position: absolute;
            transform: translateY(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .workspace.active { opacity: 1; visibility: visible; transform: translateY(0); position: relative; }

        .sidebar { width: 45%; min-width: 400px; max-width: 720px; flex-shrink: 0; display: flex; flex-direction: column; gap: 32px; }
        .video-container { border-radius: 24px; overflow: hidden; background: #000; box-shadow: var(--shadow); transform: translateZ(0); }
        video { width: 100%; display: block; outline: none; }

        .vocab-container {
            flex: 1; background: var(--surface); border-radius: 24px; border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow);
        }
        .vocab-header { padding: 16px 20px; font-size: 15px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .export-btn { background: rgba(0,0,0,0.05); color: var(--text-main); border: none; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: auto; margin-right: 12px; }
        .dark-theme .export-btn { background: rgba(255,255,255,0.1); }
        .vocab-list { flex: 1; overflow-y: auto; padding: 12px; }
        .word-item { padding: 12px 16px; border-radius: 12px; margin-bottom: 4px; transition: 0.2s; }
        .word-item:hover { background: var(--hover-bg); }
        .word-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .word-text { font-size: 15px; font-weight: 700; color: var(--text-main); }
        .word-def { font-size: 13px; color: var(--text-sub); line-height: 1.4; }
        .word-del { cursor: pointer; color: #ff3b30; font-size: 12px; opacity: 0; transition: 0.2s; }
        .word-item:hover .word-del { opacity: 1; }

        .main-content {
            flex: 1; background: var(--surface); border-radius: 24px; border: 1px solid var(--glass-border);
            backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur);
            position: relative; display: flex; flex-direction: column; box-shadow: var(--shadow); overflow: hidden;
        }

        /* 工具栏 */
        .toolbar-floating {
            position: absolute; top: 24px; left: 50%; transform: translateX(-50%) scale(1);
            background: var(--liquid-bg); backdrop-filter: blur(50px) saturate(200%); -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--liquid-border); box-shadow: var(--liquid-shadow);
            border-radius: 99px; padding: 6px 8px; display: flex; gap: 4px; z-index: 50; transition: all 0.4s;
        }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 50%; border: none; background: transparent;
            color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.25s;
        }
        .icon-btn:active { transform: scale(0.85); background: var(--hover-bg); }
        .icon-btn:hover { background: var(--hover-bg); }
        .icon-btn.active { background: var(--text-main); color: var(--bg); }
        .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
        .speed-btn-txt {
            padding: 0 16px; height: 38px; border-radius: 99px; border: none; background: transparent;
            color: var(--text-main); font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.25s;
        }
        .speed-btn-txt:active { background: var(--hover-bg); }
        .divider { width: 1px; height: 20px; background: var(--border); margin: auto 4px; }

        /* 排版与克漏字 */

// 🍎 异步加载真实数据架构 (预留给 Supabase)
// ==========================================
// ③ 替换 loadVideosFromSupabase()
async function loadVideosFromSupabase() {
    try {
        const { data, error } = await supabaseClient
            .from('videos')
            .select('*')
            .order('created_at', { ascending: false });

        if(error) {
            console.error(error);
            return;
        }

        videoDatabase = data.map(v => ({
            id: v.id,
            title: v.title,
            episode: v.episode || '',
            rating: v.rating || 5,
            tags: v.tags || [],
            accent: v.accent || 'US',
            creator: v.creator || '',
            coverUrl: v.cover_url,
            videoUrl: v.video_url,
            progress: 0,
            favorite: false,
            status: 'new',
            duration: '--:--',
            date: 'Cloud'
        }));

        // 恢复所有视频保存的进度
        videoDatabase.forEach(v => {
            const savedPct = localStorage.getItem(`prog_pct_${v.id}`);
            if(savedPct) {
                v.progress = parseFloat(savedPct);
                v.status = v.progress >= 99 ? 'completed' : 'history';
            }
        });

        renderGrid();
    } catch(e){
        console.error(e);
    }
}

        html += `<svg class="star ${cls}" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>`;
    }

};

function renderGrid() {
    let filtered = videoDatabase;
    const dict = i18n[state.lang];

    // 1. 搜尋過濾
    if (state.searchText) {
        filtered = filtered.filter(v => v.title.toLowerCase().includes(state.searchText.toLowerCase()));
    }

    // 2. Tab 過濾
    if (state.currentTab === 'history') {
        filtered = filtered.filter(v => v.status === 'history' || v.progress > 0 && v.progress < 99);
    } else if (state.currentTab === 'completed') {
        filtered = filtered.filter(v => v.status === 'completed' || v.progress >= 99);
    } else if (state.currentTab === 'favorites') {
        filtered = filtered.filter(v => v.favorite === true);
    }

    // 3. 下拉框過濾 (僅限 All 標籤)
    let isFiltering = false;
    if (state.currentTab === 'all') {
        if (state.filters.rating !== 'all') { filtered = filtered.filter(v => v.rating === parseInt(state.filters.rating)); isFiltering = true; }
        if (state.filters.tag !== 'all') { filtered = filtered.filter(v => v.tags.includes(state.filters.tag)); isFiltering = true; }
        if (state.filters.accent !== 'all') { filtered = filtered.filter(v => v.accent === state.filters.accent); isFiltering = true; }
    }

    // 空狀態
    if (filtered.length === 0) {
        dom.mainContentArea.innerHTML = `
            <div class="empty-state" style="margin-top:40px;">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                <h3>${dict.empty_title}</h3>
                <p>${dict.empty_desc}</p>
            </div>
        `;
        return;
    }

    // 🍎 Apple TV 風格橫向佈局判斷：只有在首頁(All)且沒有進行任何搜尋、過濾時才顯示分類滾動
    if (state.currentTab === 'all' && !state.searchText && !isFiltering) {
        let html = '';
        
        // 繼續觀看
        const continueWatching = filtered.filter(v => v.progress > 0 && v.progress < 99);
        if (continueWatching.length > 0) {
            html += `<div class="category-section"><div class="category-header">${dict.cat_continue}</div>
                     <div class="row-scroll">${continueWatching.map(v => renderVideoCard(v, dict)).join('')}</div></div>`;
        }

        // 學術深度
        const academic = filtered.filter(v => v.tags.includes('Academic'));
        if (academic.length > 0) {
            html += `<div class="category-section"><div class="category-header">${dict.cat_academic}</div>
                     <div class="row-scroll">${academic.map(v => renderVideoCard(v, dict)).join('')}</div></div>`;
        }

        // 日常與娛樂
        const daily = filtered.filter(v => v.tags.includes('Daily') || v.tags.includes('Entertainment'));
        if (daily.length > 0) {
            html += `<div class="category-section"><div class="category-header">${dict.cat_daily}</div>
                     <div class="row-scroll">${daily.map(v => renderVideoCard(v, dict)).join('')}</div></div>`;
        }
        
        // 商業
        const business = filtered.filter(v => v.tags.includes('Business'));
        if (business.length > 0) {
            html += `<div class="category-section"><div class="category-header">${dict.cat_business}</div>
                     <div class="row-scroll">${business.map(v => renderVideoCard(v, dict)).join('')}</div></div>`;
        }

        dom.mainContentArea.innerHTML = html;
    } 
    // 標準網格視圖
    else {
        dom.mainContentArea.innerHTML = `<div class="video-grid">${filtered.map(v => renderVideoCard(v, dict)).join('')}</div>`;
    }
}

// 🍎 视频加载与播放器逻辑 (增加進度恢復與倍速還原)
// ==========================================
// ④ 替换 loadVideo()
async function loadVideo(id) {
    const videoData = videoDatabase.find(v => v.id === id);
    if (!videoData) return;
    state.currentVideoId = id;
    
    if (!videoData.videoUrl) {
        alert("This is a mock card. Please ensure the video URL is set in Supabase.");
        return;
    }

    const card = document.getElementById(`card-${id}`);
    if(card) card.classList.add('loading');

    try {
        if(state.videoObjectURL) { URL.revokeObjectURL(state.videoObjectURL); state.videoObjectURL = null; }
        dom.player.src = videoData.videoUrl;
        
        // 恢復倍速
        const savedRate = localStorage.getItem('playbackRate') || 1;
        dom.player.playbackRate = parseFloat(savedRate);
        dom.speedToggleBtn.innerText = `${parseFloat(savedRate).toFixed(1)}x`;

        // 恢復播放進度
        dom.player.addEventListener('loadedmetadata', function onLoaded() {
            const savedProg = localStorage.getItem(`prog_time_${id}`);
            if(savedProg && parseFloat(savedProg) > 0) {
                dom.player.currentTime = parseFloat(savedProg);
            }
            dom.player.removeEventListener('loadedmetadata', onLoaded);
        });
        
        const { data, error } = await supabaseClient
            .from('video_subtitles')
            .select('content')
            .eq('video_id', id)
            .single();

        if(error) {
            console.error(error);
            return;
        }

        state.subtitles = data.content || [];

        renderTranscript();
        enterWorkspace();
        
    } catch (err) {
        console.error("Failed:", err);
        alert(`Failed to load subtitles.`);
    } finally {
        if(card) card.classList.remove('loading');
    }
}

// ... 高亮與排版邏輯保持不變
function applyLocalHighlights(text, highlights) {
    if (!highlights || !Array.isArray(highlights) || highlights.length === 0) return text;
    let res = text; let placeholders = [];
    const sortedHighlights = [...highlights].sort((a, b) => b.text.length - a.text.length);
    
    sortedHighlights.forEach(hl => {
        const escapeRegExp = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`\\b${escapeRegExp(hl.text)}\\b`, 'gi');
        res = res.replace(regex, match => {
            if (state.isClozeMode) {
                const width = Math.max(match.length * 14 + 16, 40); 
                placeholders.push(`<input type="text" class="cloze-input" data-answer="${match.toLowerCase()}" data-original="${match}" style="width: ${width}px;" autocomplete="off" spellcheck="false" />`);
            } else {
                const className = hl.type === 'phrase' ? 'hl-phrase' : 'hl-word';
                placeholders.push(`<span class="${className}">${match}</span>`);
            }
            return `__PH__${placeholders.length - 1}__`;
        });
    });
    placeholders.forEach((html, i) => { res = res.replace(`__PH__${i}__`, html); });
    return res;
}

// 導出 CSV
dom.exportVocabBtn.onclick = () => {
    const words = getVocab();
    if(words.length === 0) return alert('No words to export.');
    
    // 清理 HTML 標籤
    const stripHtml = (html) => {
       const tmp = document.createElement('DIV');
       tmp.innerHTML = html;
       return tmp.textContent || tmp.innerText || '';
    };

    let csvContent = "Word,Definition,Example,Synonyms\n";
    words.forEach(w => {
        const cleanDef = stripHtml(w.definition).replace(/"/g, '""');
        const cleanEx = (w.example || "").replace(/"/g, '""');
        const cleanSyn = (w.synonyms || []).join('; ').replace(/"/g, '""');
        csvContent += `"${w.word}","${cleanDef}","${cleanEx}","${cleanSyn}"\n`;
    });

    const blob = new Blob(["\uFEFF"+csvContent], { type: 'text/csv;charset=utf-8;' }); // 加上 BOM 以支援 Excel 中文
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.setAttribute("href", url);
    link.setAttribute("download", "vocabulary_export.csv");
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};

        document.querySelectorAll('.sp-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active'); dom.speedMenu.classList.remove('show');
    };
});

dom.mobileVocabToggle.onclick = () => dom.vocabContainer.classList.add('open');
dom.closeVocabBtn.onclick = () => dom.vocabContainer.classList.remove('open');

// 支援 VTT 解析
function parseSRT(data, isVtt = false) {
    if(isVtt) data = data.replace(/^WEBVTT.*\n*/, ''); // 移除 VTT 頭部
    
    // 相容 . (VTT) 或 , (SRT)
    const subtitleRegex = /(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})(?:\s+[^\n]*)?\n([\s\S]*?)(?=\n{2,}|\n\d+\n\d{2}:|$)/g;
    const subtitles = []; let match;
    const timeToSec = (t) => { const [hrs, mins, secs] = t.replace(',', '.').split(':'); return (+hrs * 3600) + (+mins * 60) + parseFloat(secs); };
    while ((match = subtitleRegex.exec(data.replace(/\r\n/g, '\n'))) !== null) {
        const start = timeToSec(match[1]); const end = timeToSec(match[2]);
        const text = match[3].replace(/<[^>]+>/g, '').trim(); const cleanText = text.replace(/\n/g, ' '); 
        if (cleanText) subtitles.push({ start, end, en: cleanText, zh: "", highlights: [] });
    }
    return subtitles;
}
// 極簡 ASS 文字擷取 (預留)
function parseASS(data) {
    const lines = data.split('\n'); const subtitles = [];
    lines.forEach(l => {
        if(l.startsWith('Dialogue:')) {
            const parts = l.split(',');
            if(parts.length > 9) {
                // 非常基礎的擷取，忽略時間軸僅作展示
                subtitles.push({ start: 0, end: 5, en: parts.slice(9).join(',').replace(/{[^}]+}/g, ''), zh: "", highlights: [] });
            }
        }
    });
    return subtitles;
}

let lyricNodes = [];
function renderTranscript() {
    dom.transcript.innerHTML = state.subtitles.map((item, i) => `
        <div class="lyric-line" data-index="${i}">
            <div class="lyric-en">${applyLocalHighlights(item.en, item.highlights)}</div>
            ${item.zh ? `<div class="lyric-zh ${state.translationVisible ? '' : 'hidden'}">${item.zh}</div>` : ''}
        </div>
    `).join('');
    
    lyricNodes = Array.from(document.querySelectorAll('.lyric-line'));
    lyricNodes.forEach((node, i) => {
        node.onclick = (e) => { if (e.target.tagName === 'INPUT') return; dom.player.currentTime = state.subtitles[i].start; dom.player.play(); };
        node.ondblclick = (e) => { if (e.target.tagName === 'INPUT') return; toggleLoop(i, node); };
    });
}

// 播放進度自動保存邏輯
let isThrottled = false;
dom.player.addEventListener('timeupdate', () => {
    if (isThrottled) return;
    isThrottled = true;
    requestAnimationFrame(() => {
        const now = dom.player.currentTime; 
        
        // --- 字幕捲動 ---
        if(state.subtitles.length && lyricNodes.length) {
            let activeIdx = -1;
            let l = 0, r = state.subtitles.length - 1;
            while(l <= r) {
                const m = Math.floor((l+r)/2);
                if(now >= state.subtitles[m].start && now <= state.subtitles[m].end) { activeIdx = m; break; }
                if(now < state.subtitles[m].start) r = m - 1; else l = m + 1;
            }

            if (activeIdx !== state.currentActiveIndex) {
                if (state.currentActiveIndex !== -1 && lyricNodes[state.currentActiveIndex]) lyricNodes[state.currentActiveIndex].classList.remove('active');
                if (activeIdx !== -1 && lyricNodes[activeIdx]) {
                    lyricNodes[activeIdx].classList.add('active');
                    const offset = window.innerWidth <= 1024 ? 140 : dom.transcript.clientHeight / 2;
                    dom.transcript.scrollTo({ top: lyricNodes[activeIdx].offsetTop - offset, behavior: 'smooth' });
                }
                state.currentActiveIndex = activeIdx;
            }

            if (activeIdx !== -1 && state.dictationMode && now >= state.subtitles[activeIdx].end - 0.1) dom.player.pause();
            if (state.currentLoopIndex !== null) {
                const sub = state.subtitles[state.currentLoopIndex];
                if (now >= sub.end - 0.05 || now < sub.start) dom.player.currentTime = sub.start;
            }
        }
        isThrottled = false;
    });
});

// ⑤ 自动保存观看进度
setInterval(async () => {
    if(!state.currentVideoId) return;
    if(!dom.player.duration) return;

    const pct = Math.floor((dom.player.currentTime / dom.player.duration) * 100);

    localStorage.setItem(`prog_time_${state.currentVideoId}`, dom.player.currentTime);
    localStorage.setItem(`prog_pct_${state.currentVideoId}`, pct);

    // 找到記憶體中的影片並更新
    const vid = videoDatabase.find(v => v.id === state.currentVideoId);
    if(vid) vid.progress = pct;

    try {
        await supabaseClient
        .from('progress')
        .upsert({
            user_id: 'guest',
            video_id: state.currentVideoId,
            watched_seconds: dom.player.currentTime,
            progress_percent: pct
        });
    } catch(e) {
        console.error("Progress save error:", e);
    }

}, 5000);

document.addEventListener('selectionchange', () => setTimeout(handleSelection, 300));
async function handleSelection() {
    const text = window.getSelection().toString().trim();
    if (text && /^[a-zA-Z\s'-]{2,60}$/.test(text)) {
        if(dom.tooltip.classList.contains('show')) return;
        
        if(window.innerWidth > 1024) {
            const rect = window.getSelection().getRangeAt(0).getBoundingClientRect();
            let topPos = rect.top - 200; let leftPos = rect.left + (rect.width/2) - 160;
            if (topPos < 20) topPos = rect.bottom + 10;
            if (leftPos < 10) leftPos = 10; if (leftPos + 320 > window.innerWidth) leftPos = window.innerWidth - 330;
            dom.tooltip.style.left = `${leftPos}px`; dom.tooltip.style.top = `${topPos}px`;
        }
        
        const dict = i18n[state.lang];
        dom.tooltip.classList.add('show'); 
        document.getElementById('tooltipWord').innerText = text.toLowerCase();
        document.getElementById('tooltipPhonetic').innerText = dict.tt_analyzing; 
        document.getElementById('tooltipDef').innerHTML = "";
        
        // 隱藏升級板塊
        document.getElementById('tooltipExSection').style.display = 'none';
        document.getElementById('tooltipSynSection').style.display = 'none';
        
        dom.saveWordBtn.disabled = true;

        const isPhrase = text.includes(' ');
        try {
            if (isPhrase) {
                document.getElementById('tooltipPhonetic').innerText = "[Idea Unit / Phrase]";
                document.getElementById('tooltipDef').innerHTML = "<em>Phrase definitions require an advanced NLP endpoint. Saved as an integrated unit.</em>";
                state.currentWord = { word: text.toLowerCase(), phonetic: '', definition: "Phrase / Idea Unit", example: "", synonyms: [] };
                dom.saveWordBtn.disabled = false;
            } else {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${text}`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();
                
                // 🍎 提取 AI 級解析資料：例句與同義詞
                const defs = []; let synonyms = []; let example = "";
                data[0].meanings.forEach(m => {
                    if(m.synonyms && m.synonyms.length > 0) synonyms.push(...m.synonyms);
                    m.definitions.forEach(d => {
                        if(d.example && !example) example = d.example; // 取第一個例句
                        defs.push(`<strong>${m.partOfSpeech}</strong>: ${d.definition}`);
                    });
                });
                
                // 去重同義詞並取前 5 個
                synonyms = [...new Set(synonyms)].slice(0, 5);
                const finalDef = defs.slice(0,2).join('<br><br>');

                state.currentWord = { 
                    word: text.toLowerCase(), 
                    phonetic: data[0].phonetic || '', 
                    definition: finalDef,
                    example: example,
                    synonyms: synonyms
                };
                
                document.getElementById('tooltipPhonetic').innerText = state.currentWord.phonetic;
                document.getElementById('tooltipDef').innerHTML = finalDef;
                
                if (example) {
                    document.getElementById('tooltipExSection').style.display = 'block';
                    document.getElementById('tooltipExample').innerText = `"${example}"`;
                }
                if (synonyms.length > 0) {
                    document.getElementById('tooltipSynSection').style.display = 'block';
                    document.getElementById('tooltipSynonyms').innerHTML = synonyms.map(s => `<span class="tt-synonym-tag">${s}</span>`).join('');
                }
                
                dom.saveWordBtn.disabled = false;
            }
        } catch {
            document.getElementById('tooltipPhonetic').innerHTML = `<span style="color:#ff3b30">Not found in lexicon</span>`;
            state.currentWord = null;
        }
    }
}

const closeOverlays = (e) => {
    if (!dom.tooltip.contains(e.target)) dom.tooltip.classList.remove('show');
    if (window.innerWidth <= 1024 && !dom.vocabContainer.contains(e.target) && !dom.mobileVocabToggle.contains(e.target)) { dom.vocabContainer.classList.remove('open'); }
};
document.addEventListener('mousedown', closeOverlays); document.addEventListener('touchstart', closeOverlays, {passive: true});

dom.saveWordBtn.onclick = () => {
    if (!state.currentWord) return;
    let words = getVocab();
    if (!words.some(w => w.word === state.currentWord.word)) { words.unshift(state.currentWord); saveVocab(words); renderVocab(); }
    dom.tooltip.classList.remove('show');
};

function renderVocab() {
    const words = getVocab();
    const dict = i18n[state.lang] || i18n.zh;
    document.getElementById('vocabCount').innerText = words.length;
    dom.vocabList.innerHTML = words.map((w, i) => `
        <div class="word-item">
            <div class="word-head"><div class="word-text">${w.word}</div><div class="word-del" onclick="deleteWord(${i})">${dict.word_remove}</div></div>
            <div class="word-def">${w.definition}</div>
            ${w.example ? `<div style="font-size:12px; color:var(--text-sub); margin-top:4px; font-style:italic;">Ex: ${w.example}</div>` : ''}
        </div>
    `).join('');
}
window.deleteWord = i => { let words = getVocab(); words.splice(i, 1); saveVocab(words); renderVocab(); };

function checkLocalReady() { if (state.localReady.v && state.localReady.s) dom.btnLaunchLocal.classList.add('active'); }
function handleLocalFiles(files) {
    Array.from(files).forEach(f => {
        if (f.type.includes('video') || f.name.endsWith('.mp4') || f.name.endsWith('.webm')) {
            if(state.videoObjectURL) URL.revokeObjectURL(state.videoObjectURL);
            state.videoObjectURL = URL.createObjectURL(f); dom.player.src = state.videoObjectURL;
            dom.btnLocalVideo.classList.add('ready'); dom.txtLocalVideo.innerText = f.name; state.localReady.v = true;
        } else if (f.name.endsWith('.srt') || f.name.endsWith('.json') || f.name.endsWith('.vtt') || f.name.endsWith('.ass')) {
            const r = new FileReader();
            r.onload = () => {
                if(f.name.endsWith('.json')) state.subtitles = JSON.parse(r.result);
                else if (f.name.endsWith('.vtt')) state.subtitles = parseSRT(r.result, true);
                else if (f.name.endsWith('.ass')) state.subtitles = parseASS(r.result);
                else state.subtitles = parseSRT(r.result);
                
                dom.btnLocalSub.classList.add('ready'); dom.txtLocalSub.innerText = f.name; state.localReady.s = true; checkLocalReady();
            };
            r.readAsText(f);
        }
    });
    checkLocalReady();
}
dom.localVideoInput.addEventListener('change', e => handleLocalFiles(e.target.files));
dom.localSubInput.addEventListener('change', e => handleLocalFiles(e.target.files));
dom.btnLaunchLocal.onclick = () => { if (state.localReady.v && state.localReady.s) { renderTranscript(); enterWorkspace(); } };

document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => { if(!dom.homeScreen.classList.contains('hidden')) { e.preventDefault(); handleLocalFiles(e.dataTransfer.files); } });

// 初始化
loadVideosFromSupabase(); // 首先嘗試恢復存儲的進度並加載
updateLanguageUI();

// 恢復初始倍速 UI
const initialRate = localStorage.getItem('playbackRate') || 1;
dom.speedToggleBtn.innerText = `${parseFloat(initialRate).toFixed(1)}x`;
document.querySelectorAll('.sp-item').forEach(i => {
    i.classList.toggle('active', parseFloat(i.dataset.speed) === parseFloat(initialRate));
});

</script>
