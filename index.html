<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Studio Listening Pro</title>
    <style>
        /* 🍎 极简配色系统与液态玻璃变量 */
        :root {
            --bg: #F5F5F7;
            --surface: #FFFFFF;
            --text-main: #1D1D1F;
            --text-sub: #86868B;
            --border: rgba(0, 0, 0, 0.08);
            --blue: #007AFF;
            --green: #34C759;
            --orange: #FF9500;
            --hover-bg: rgba(0, 0, 0, 0.06);
            
            /* 液态玻璃 (浅色) */
            --liquid-bg: rgba(255, 255, 255, 0.55);
            --liquid-border: rgba(255, 255, 255, 0.9);
            --liquid-shadow: 0 16px 40px rgba(0, 0, 0, 0.08), 
                             inset 0 1px 1px rgba(255, 255, 255, 0.8),
                             inset 0 -1px 1px rgba(0, 0, 0, 0.02);
                             
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            --safe-bottom: env(safe-area-inset-bottom, 20px);
        }

        .dark-theme {
            --bg: #000000;
            --surface: #1C1C1E;
            --text-main: #F5F5F7;
            --text-sub: #8E8E93;
            --border: rgba(255, 255, 255, 0.1);
            --blue: #0A84FF;
            --green: #30D158;
            --orange: #FF9F0A;
            --hover-bg: rgba(255, 255, 255, 0.12);
            
            /* 液态玻璃 (深色) */
            --liquid-bg: rgba(30, 30, 32, 0.65);
            --liquid-border: rgba(255, 255, 255, 0.15);
            --liquid-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), 
                             inset 0 1px 1px rgba(255, 255, 255, 0.15),
                             inset 0 -1px 1px rgba(0, 0, 0, 0.2);
                             
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100dvh;
            overflow: hidden;
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-font-smoothing: antialiased;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 🍎 欢迎屏 */
        .welcome-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; background: var(--bg);
            transition: opacity 0.5s ease, visibility 0.5s ease, transform 0.5s ease;
            padding: 24px; text-align: center;
        }
        .welcome-screen.hidden { opacity: 0; visibility: hidden; transform: scale(0.98); }
        .welcome-title { font-size: 42px; font-weight: 700; letter-spacing: -1.2px; margin-bottom: 12px; }
        .welcome-sub { font-size: 17px; color: var(--text-sub); margin-bottom: 40px; font-weight: 500; }
        
        .upload-actions { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
        .btn-large {
            background: var(--surface); border: 1px solid var(--border); padding: 14px 28px;
            border-radius: 99px; font-size: 15px; font-weight: 600; color: var(--text-main);
            cursor: pointer; box-shadow: var(--shadow); transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
            display: flex; align-items: center; gap: 8px;
        }
        .btn-large:active { transform: scale(0.96); }
        .btn-large.active { border-color: var(--blue); color: var(--blue); }
        .btn-large svg { width: 18px; height: 18px; fill: currentColor; }

        /* 🍎 主工作区 */
        .workspace {
            display: flex; width: 100%; max-width: 1600px; height: 100dvh;
            padding: 24px; gap: 24px; opacity: 0; visibility: hidden;
            transform: translateY(20px); transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .workspace.active { opacity: 1; visibility: visible; transform: translateY(0); }

        /* 修改了侧边栏的宽度逻辑，使其在电脑端自适应并放大视频 */
        .sidebar { 
            width: 45%; 
            min-width: 400px; 
            max-width: 720px; 
            flex-shrink: 0; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        .video-container { border-radius: 20px; overflow: hidden; background: #000; box-shadow: var(--shadow); transform: translateZ(0); }
        video { width: 100%; display: block; outline: none; }

        .vocab-container {
            flex: 1; background: var(--surface); border-radius: 20px; border: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow);
        }
        .vocab-header { padding: 16px 20px; font-size: 15px; font-weight: 600; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .vocab-list { flex: 1; overflow-y: auto; padding: 12px; }
        .word-item { padding: 12px 16px; border-radius: 12px; margin-bottom: 4px; transition: 0.2s; }
        .word-item:hover { background: var(--hover-bg); }
        .word-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .word-text { font-size: 15px; font-weight: 700; color: var(--text-main); }
        .word-def { font-size: 13px; color: var(--text-sub); line-height: 1.4; }
        .word-del { cursor: pointer; color: #ff3b30; font-size: 12px; opacity: 0; transition: 0.2s; }
        .word-item:hover .word-del { opacity: 1; }

        .main-content {
            flex: 1; background: var(--surface); border-radius: 24px; border: 1px solid var(--border);
            position: relative; display: flex; flex-direction: column; box-shadow: var(--shadow); overflow: hidden;
        }

        /* 🍎 悬浮岛工具栏 (液态玻璃形态) */
        .toolbar-floating {
            position: absolute; top: 24px; left: 50%; 
            transform: translateX(-50%) scale(1);
            
            background: var(--liquid-bg); 
            backdrop-filter: blur(50px) saturate(200%); 
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--liquid-border); 
            box-shadow: var(--liquid-shadow);
            
            border-radius: 99px; padding: 6px 8px;
            display: flex; gap: 4px; z-index: 50; 
            
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1.1);
        }
        
        .toolbar-floating:has(.icon-btn:active),
        .toolbar-floating:has(.speed-btn-txt:active) {
            transform: translateX(-50%) scale(0.96);
            border-radius: 40px; 
            background: var(--liquid-bg);
            filter: brightness(0.95);
        }

        .icon-btn {
            width: 38px; height: 38px; border-radius: 50%; border: none; background: transparent;
            color: var(--text-main); cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .icon-btn:active { transform: scale(0.85); background: var(--hover-bg); }
        .icon-btn:hover { background: var(--hover-bg); }
        .icon-btn.active { background: var(--text-main); color: var(--bg); }
        .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
        
        .speed-btn-txt {
            padding: 0 16px; height: 38px; border-radius: 99px; border: none; background: transparent;
            color: var(--text-main); font-size: 14px; font-weight: 600; cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .speed-btn-txt:active { transform: scale(0.9); background: var(--hover-bg); }
        .divider { width: 1px; height: 20px; background: var(--border); margin: auto 4px; }

        /* 🍎 沉浸式排版 */
        .transcript-flow {
            flex: 1; overflow-y: auto; 
            padding: 80px 10% 120px 10%; 
            scroll-behavior: smooth;
        }
        .transcript-flow::-webkit-scrollbar { display: none; }
        
        .lyric-line {
            margin-bottom: 24px; cursor: pointer; opacity: 0.35; transform: scale(0.98);
            transform-origin: left center; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            border-left: 3px solid transparent; padding-left: 16px;
        }
        .lyric-line:active { opacity: 0.8; }
        .lyric-line.active { opacity: 1; transform: scale(1.02); border-left-color: var(--blue); }
        .lyric-line.looping { border-left-color: var(--green); }
        
        .lyric-en { font-size: 24px; font-weight: 700; line-height: 1.4; letter-spacing: -0.5px; user-select: text; -webkit-user-select: text; }
        .lyric-zh { font-size: 15px; font-weight: 500; color: var(--text-sub); margin-top: 8px; line-height: 1.5; transition: opacity 0.3s; }
        .lyric-zh.hidden { display: none; }
        
        .hl-word { background: rgba(52, 199, 89, 0.15); color: var(--green); border-radius: 6px; padding: 2px 4px; }
        .hl-phrase { background: rgba(255, 149, 0, 0.15); color: var(--orange); border-radius: 6px; padding: 2px 4px; }

        /* 🍎 极简弹窗与菜单 */
        .tooltip {
            position: fixed; width: 280px; padding: 20px; border-radius: 20px;
            background: var(--liquid-bg); backdrop-filter: blur(50px) saturate(200%); -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--liquid-border); box-shadow: var(--liquid-shadow);
            display: none; z-index: 9999; transform: translateY(10px); opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .tooltip.show { transform: translateY(0); opacity: 1; display: block; }
        .tt-word { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
        .tt-phonetic { font-size: 13px; font-family: monospace; color: var(--text-sub); margin-bottom: 12px; }
        .tt-def { font-size: 14px; line-height: 1.5; margin-bottom: 16px; max-height: 120px; overflow-y: auto;}
        .tt-btn {
            width: 100%; background: var(--text-main); color: var(--bg); border: none; padding: 12px;
            border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s;
        }
        .tt-btn:active { transform: scale(0.96); }

        .speed-menu {
            position: fixed; width: 100px; 
            background: var(--liquid-bg); backdrop-filter: blur(50px) saturate(200%); -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--liquid-border); border-radius: 16px; padding: 6px; box-shadow: var(--liquid-shadow);
            display: none; flex-direction: column; gap: 2px; z-index: 9998; opacity: 0; transform: translateY(-10px); transition: 0.2s;
        }
        .speed-menu.show { display: flex; opacity: 1; transform: translateY(0); }
        .sp-item { padding: 10px; border-radius: 10px; text-align: center; font-size: 14px; font-weight: 500; cursor: pointer; }
        .sp-item.active { background: var(--text-main); color: var(--bg); }

        /* --- 📱 移动端极致原生适配 --- */
        #mobileVocabToggle { display: none; }
        .vocab-close-mobile { display: none; font-size: 24px; cursor: pointer; color: var(--text-sub); font-weight: 300; }

        @media (max-width: 1024px) {
            body { align-items: flex-start; }
            .welcome-title { font-size: 32px; }
            
            .workspace { flex-direction: column; padding: 0; gap: 0; }
            .sidebar { width: 100%; max-width: none; min-width: 0; gap: 0; }
            
            .video-container { border-radius: 0; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; background: #000; }
            video { max-height: 35dvh; }
            
            .main-content { border-radius: 0; border: none; box-shadow: none; flex: 1; min-height: 0; background: transparent; }
            
            .transcript-flow { padding: 24px 20px calc(90px + var(--safe-bottom)) 20px; }
            .lyric-en { font-size: 20px; }
            .lyric-zh { font-size: 14px; }
            .lyric-line { padding-left: 12px; margin-bottom: 20px; }
            
            .toolbar-floating {
                top: auto;
                bottom: calc(24px + var(--safe-bottom));
                width: auto; padding: 8px; gap: 4px;
            }
            .icon-btn { width: 42px; height: 42px; }
            .speed-btn-txt { height: 42px; }

            #mobileVocabToggle { display: flex; }
            .vocab-close-mobile { display: block; }
            .word-del { opacity: 1; } 
            
            .vocab-container {
                position: fixed; bottom: 0; left: 0; width: 100%; height: 75dvh;
                border-radius: 36px 36px 0 0; z-index: 9999;
                transform: translateY(100%); transition: 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
                
                background: var(--liquid-bg);
                backdrop-filter: blur(50px) saturate(200%); -webkit-backdrop-filter: blur(50px) saturate(200%);
                border: 1px solid var(--liquid-border); box-shadow: var(--liquid-shadow);
            }
            .vocab-header { border-bottom: 1px solid rgba(120,120,128, 0.2); }
            .vocab-container.open { transform: translateY(0); }

            .tooltip {
                top: auto !important; bottom: 0 !important; left: 0 !important; width: 100% !important;
                border-radius: 36px 36px 0 0; transform: translateY(100%);
                padding: 24px 24px calc(24px + var(--safe-bottom)) 24px;
            }
            .tooltip.show { transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="welcome-screen" id="welcomeScreen">
    <div class="welcome-title">Studio Pro</div>
    <div class="welcome-sub">Drop video and subtitles to begin</div>
    <div class="upload-actions">
        <label class="btn-large" id="btnVideo">
            <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            <span id="txtVideo">Video (MP4)</span>
            <input type="file" id="videoInput" accept="video/mp4,video/webm" hidden>
        </label>
        <label class="btn-large" id="btnSub">
            <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
            <span id="txtSub">Subtitle (SRT / JSON)</span>
            <input type="file" id="subtitleInput" accept=".srt,.json" hidden>
        </label>
    </div>
</div>

<div class="workspace" id="workspace">
    <div class="sidebar">
        <div class="video-container">
            <video id="player" controls playsinline="true" webkit-playsinline="true" x5-playsinline="true" x5-video-player-type="h5" x5-video-player-fullscreen="false" x-webkit-airplay="allow"></video>
        </div>
        <div class="vocab-container" id="vocabContainer">
            <div class="vocab-header">
                <span>Vocabulary <span id="vocabCount" style="color:var(--text-sub); font-weight:normal; margin-left:6px;">0</span></span>
                <span class="vocab-close-mobile" id="closeVocabBtn">✕</span>
            </div>
            <div class="vocab-list" id="vocabList"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="toolbar-floating" id="toolbar">
            <button class="icon-btn" id="reuploadBtn" title="Back to Home">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            </button>
            <button class="icon-btn" id="themeBtn" title="Toggle Theme">
                <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
            </button>
            <div class="divider"></div>
            <button class="icon-btn active" id="translateBtn" title="Translation">
                <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
            </button>
            <button class="icon-btn" id="dictationBtn" title="Dictation Mode">
                <svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="icon-btn" id="mobileVocabToggle" title="Vocabulary">
                <svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
            </button>
            <div class="divider"></div>
            <button class="speed-btn-txt" id="speedToggleBtn">1.0x</button>
        </div>

        <div class="transcript-flow" id="transcript"></div>
    </div>
</div>

<div class="speed-menu" id="speedMenu">
    <div class="sp-item" data-speed="0.5">0.5x</div>
    <div class="sp-item" data-speed="0.8">0.8x</div>
    <div class="sp-item active" data-speed="1">1.0x</div>
    <div class="sp-item" data-speed="1.2">1.2x</div>
    <div class="sp-item" data-speed="1.5">1.5x</div>
</div>

<div class="tooltip" id="tooltip">
    <div class="tt-word" id="tooltipWord"></div>
    <div class="tt-phonetic" id="tooltipPhonetic"></div>
    <div class="tt-def" id="tooltipDef"></div>
    <button class="tt-btn" id="saveWordBtn">Add to Vocab</button>
</div>

<script>
const state = { 
    subtitles: [], 
    currentLoopIndex: null, 
    currentActiveIndex: -1, 
    dictationMode: false, 
    translationVisible: true, 
    currentWord: null,
    videoObjectURL: null 
};

const dom = { 
    player: document.getElementById('player'), 
    transcript: document.getElementById('transcript'), 
    tooltip: document.getElementById('tooltip'), 
    themeBtn: document.getElementById('themeBtn'), 
    translateBtn: document.getElementById('translateBtn'), 
    dictationBtn: document.getElementById('dictationBtn'), 
    saveWordBtn: document.getElementById('saveWordBtn'), 
    vocabList: document.getElementById('vocabList'), 
    welcomeScreen: document.getElementById('welcomeScreen'), 
    workspace: document.getElementById('workspace'), 
    vocabContainer: document.getElementById('vocabContainer'), 
    mobileVocabToggle: document.getElementById('mobileVocabToggle'), 
    closeVocabBtn: document.getElementById('closeVocabBtn'), 
    speedToggleBtn: document.getElementById('speedToggleBtn'), 
    speedMenu: document.getElementById('speedMenu'), 
    reuploadBtn: document.getElementById('reuploadBtn'), 
    btnVideo: document.getElementById('btnVideo'), 
    btnSub: document.getElementById('btnSub'),
    toolbar: document.getElementById('toolbar')
};

// 🍎 基于 JSON 结构化数据的高亮引擎
function applyLocalHighlights(text, highlights) {
    if (!highlights || !Array.isArray(highlights) || highlights.length === 0) return text;
    
    let res = text;
    let placeholders = [];
    
    const sortedHighlights = [...highlights].sort((a, b) => b.text.length - a.text.length);
    
    sortedHighlights.forEach(hl => {
        const escapeRegExp = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`\\b${escapeRegExp(hl.text)}\\b`, 'gi');
        
        res = res.replace(regex, match => {
            const className = hl.type === 'phrase' ? 'hl-phrase' : 'hl-word';
            placeholders.push(`<span class="${className}">${match}</span>`);
            return `__PH__${placeholders.length - 1}__`;
        });
    });
    
    placeholders.forEach((html, i) => {
        res = res.replace(`__PH__${i}__`, html);
    });
    
    return res;
}

const getVocab = () => JSON.parse(localStorage.getItem('vocabPro2')) || [];
const saveVocab = words => { try { localStorage.setItem('vocabPro2', JSON.stringify(words)); } catch(e){} };

dom.reuploadBtn.onclick = () => {
    dom.workspace.classList.remove('active');
    setTimeout(() => { dom.welcomeScreen.classList.remove('hidden'); }, 300);
    dom.player.pause();
};
dom.themeBtn.onclick = () => { document.body.classList.toggle('dark-theme'); dom.themeBtn.classList.toggle('active'); };
dom.translateBtn.onclick = () => { 
    state.translationVisible = !state.translationVisible; dom.translateBtn.classList.toggle('active'); 
    document.querySelectorAll('.lyric-zh').forEach(el => el.classList.toggle('hidden', !state.translationVisible)); 
};
dom.dictationBtn.onclick = () => { state.dictationMode = !state.dictationMode; dom.dictationBtn.classList.toggle('active'); };

dom.speedToggleBtn.onclick = (e) => {
    e.stopPropagation();
    if (dom.speedMenu.classList.contains('show')) { dom.speedMenu.classList.remove('show'); return; }
    
    const rect = dom.speedToggleBtn.getBoundingClientRect();
    if (window.innerWidth <= 1024) {
        dom.speedMenu.style.top = 'auto';
        dom.speedMenu.style.bottom = `${window.innerHeight - rect.top + 12}px`;
    } else {
        dom.speedMenu.style.bottom = 'auto';
        dom.speedMenu.style.top = `${rect.bottom + 12}px`;
    }
    dom.speedMenu.style.left = `${rect.left + (rect.width/2) - 50}px`;
    dom.speedMenu.classList.add('show');
};

document.addEventListener('click', e => { 
    if (!dom.speedMenu.contains(e.target) && e.target !== dom.speedToggleBtn) {
        dom.speedMenu.classList.remove('show'); 
    }
});

document.querySelectorAll('.sp-item').forEach(item => {
    item.onclick = () => {
        const speed = parseFloat(item.dataset.speed);
        dom.player.playbackRate = speed;
        dom.speedToggleBtn.innerText = `${speed.toFixed(1)}x`;
        document.querySelectorAll('.sp-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        dom.speedMenu.classList.remove('show');
    };
});

dom.mobileVocabToggle.onclick = () => dom.vocabContainer.classList.add('open');
dom.closeVocabBtn.onclick = () => dom.vocabContainer.classList.remove('open');

// 🍎 解耦与容错升级的 SRT 解析器
function parseSRT(data) {
    const subtitleRegex = /(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})(?:\s+[^\n]*)?\n([\s\S]*?)(?=\n{2,}|\n\d+\n\d{2}:|$)/g;
    const subtitles = [];
    let match;
    
    const timeToSec = (t) => {
        const [hrs, mins, secs] = t.replace(',', '.').split(':');
        return (+hrs * 3600) + (+mins * 60) + parseFloat(secs);
    };

    while ((match = subtitleRegex.exec(data.replace(/\r\n/g, '\n'))) !== null) {
        const start = timeToSec(match[1]);
        const end = timeToSec(match[2]);
        const text = match[3].replace(/<[^>]+>/g, '').trim();
        const cleanText = text.replace(/\n/g, ' '); 
        if (cleanText) subtitles.push({ start, end, en: cleanText, zh: "", highlights: [] });
    }
    return subtitles;
}

let lyricNodes = []; // 节点缓存

function renderTranscript() {
    dom.transcript.innerHTML = state.subtitles.map((item, i) => `
        <div class="lyric-line" data-index="${i}">
            <div class="lyric-en">${applyLocalHighlights(item.en, item.highlights)}</div>
            ${item.zh ? `<div class="lyric-zh ${state.translationVisible ? '' : 'hidden'}">${item.zh}</div>` : ''}
        </div>
    `).join('');
    
    lyricNodes = Array.from(document.querySelectorAll('.lyric-line'));
    
    lyricNodes.forEach((node, i) => {
        node.onclick = () => { dom.player.currentTime = state.subtitles[i].start; dom.player.play(); };
        node.ondblclick = () => toggleLoop(i, node);
    });
}

function toggleLoop(index, node) {
    if (state.currentLoopIndex === index) {
        state.currentLoopIndex = null; node.classList.remove('looping');
    } else {
        if(state.currentLoopIndex !== null && lyricNodes[state.currentLoopIndex]) {
            lyricNodes[state.currentLoopIndex].classList.remove('looping');
        }
        state.currentLoopIndex = index; node.classList.add('looping');
        dom.player.currentTime = state.subtitles[index].start; dom.player.play();
    }
}

// 🍎 高频事件节流与性能优化
let isThrottled = false;
dom.player.addEventListener('timeupdate', () => {
    if (isThrottled || !state.subtitles.length || !lyricNodes.length) return;
    
    isThrottled = true;
    requestAnimationFrame(() => {
        const now = dom.player.currentTime;
        let activeIdx = -1;
        
        let l = 0, r = state.subtitles.length - 1;
        while(l <= r) {
            const m = Math.floor((l+r)/2);
            if(now >= state.subtitles[m].start && now <= state.subtitles[m].end) { activeIdx = m; break; }
            if(now < state.subtitles[m].start) r = m - 1; else l = m + 1;
        }

        if (activeIdx !== state.currentActiveIndex) {
            if (state.currentActiveIndex !== -1 && lyricNodes[state.currentActiveIndex]) {
                lyricNodes[state.currentActiveIndex].classList.remove('active');
            }
            if (activeIdx !== -1 && lyricNodes[activeIdx]) {
                lyricNodes[activeIdx].classList.add('active');
                const offset = window.innerWidth <= 1024 ? 140 : dom.transcript.clientHeight / 2;
                dom.transcript.scrollTo({ 
                    top: lyricNodes[activeIdx].offsetTop - offset, 
                    behavior: 'smooth' 
                });
            }
            state.currentActiveIndex = activeIdx;
        }

        if (activeIdx !== -1 && state.dictationMode && now >= state.subtitles[activeIdx].end - 0.1) dom.player.pause();
        if (state.currentLoopIndex !== null) {
            const sub = state.subtitles[state.currentLoopIndex];
            if (now >= sub.end - 0.05 || now < sub.start) dom.player.currentTime = sub.start;
        }
        
        isThrottled = false;
    });
});

document.addEventListener('selectionchange', () => setTimeout(handleSelection, 300));

// 🍎 支持意群捕获
async function handleSelection() {
    const text = window.getSelection().toString().trim();
    if (text && /^[a-zA-Z\s'-]{2,60}$/.test(text)) {
        if(dom.tooltip.classList.contains('show')) return;
        
        if(window.innerWidth > 1024) {
            const rect = window.getSelection().getRangeAt(0).getBoundingClientRect();
            let topPos = rect.top - 200; let leftPos = rect.left + (rect.width/2) - 140;
            if (topPos < 20) topPos = rect.bottom + 10;
            if (leftPos < 10) leftPos = 10; if (leftPos + 280 > window.innerWidth) leftPos = window.innerWidth - 290;
            dom.tooltip.style.left = `${leftPos}px`; dom.tooltip.style.top = `${topPos}px`;
        }
        
        dom.tooltip.classList.add('show');
        document.getElementById('tooltipWord').innerText = text.toLowerCase();
        document.getElementById('tooltipPhonetic').innerText = "Analyzing...";
        document.getElementById('tooltipDef').innerHTML = "";
        dom.saveWordBtn.disabled = true;

        const isPhrase = text.includes(' ');

        try {
            if (isPhrase) {
                document.getElementById('tooltipPhonetic').innerText = "[Idea Unit / Phrase]";
                document.getElementById('tooltipDef').innerHTML = "<em>Phrase definitions require an advanced NLP endpoint. Saved as an integrated unit.</em>";
                state.currentWord = { word: text.toLowerCase(), phonetic: '', definition: "Phrase / Idea Unit" };
                dom.saveWordBtn.disabled = false;
            } else {
                const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${text}`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();
                const defs = data[0].meanings.slice(0,2).map(m => `<strong>${m.partOfSpeech}</strong>: ${m.definitions[0].definition}`).join('<br><br>');
                state.currentWord = { word: text.toLowerCase(), phonetic: data[0].phonetic || '', definition: defs };
                document.getElementById('tooltipPhonetic').innerText = state.currentWord.phonetic;
                document.getElementById('tooltipDef').innerHTML = state.currentWord.definition;
                dom.saveWordBtn.disabled = false;
            }
        } catch {
            document.getElementById('tooltipPhonetic').innerHTML = `<span style="color:#ff3b30">Not found in lexicon</span>`;
            state.currentWord = null;
        }
    }
}

const closeOverlays = (e) => {
    if (!dom.tooltip.contains(e.target)) dom.tooltip.classList.remove('show');
    if (window.innerWidth <= 1024 && !dom.vocabContainer.contains(e.target) && !dom.mobileVocabToggle.contains(e.target)) {
        dom.vocabContainer.classList.remove('open');
    }
};
document.addEventListener('mousedown', closeOverlays);
document.addEventListener('touchstart', closeOverlays, {passive: true});

dom.saveWordBtn.onclick = () => {
    if (!state.currentWord) return;
    let words = getVocab();
    if (!words.some(w => w.word === state.currentWord.word)) { 
        words.unshift(state.currentWord); 
        saveVocab(words); 
        renderVocab(); 
    }
    dom.tooltip.classList.remove('show');
};

function renderVocab() {
    const words = getVocab();
    document.getElementById('vocabCount').innerText = words.length;
    dom.vocabList.innerHTML = words.map((w, i) => `
        <div class="word-item">
            <div class="word-head"><div class="word-text">${w.word}</div><div class="word-del" onclick="deleteWord(${i})">Remove</div></div>
            <div class="word-def">${w.definition}</div>
        </div>
    `).join('');
}
window.deleteWord = i => { let words = getVocab(); words.splice(i, 1); saveVocab(words); renderVocab(); };

let filesReady = { v: false, s: false };
function checkReady() {
    if (filesReady.v && filesReady.s) {
        dom.welcomeScreen.classList.add('hidden');
        setTimeout(() => dom.workspace.classList.add('active'), 300);
        filesReady = { v: false, s: false }; 
    }
}

function handleFiles(files) {
    Array.from(files).forEach(f => {
        if (f.type.includes('video') || f.name.endsWith('.mp4') || f.name.endsWith('.webm')) {
            if(state.videoObjectURL) URL.revokeObjectURL(state.videoObjectURL);
            state.videoObjectURL = URL.createObjectURL(f);
            dom.player.src = state.videoObjectURL;
            
            dom.player.setAttribute('playsinline', 'true'); 
            dom.player.setAttribute('webkit-playsinline', 'true');
            dom.player.setAttribute('x5-playsinline', 'true');
            dom.player.setAttribute('x5-video-player-type', 'h5');
            dom.player.setAttribute('x5-video-player-fullscreen', 'false');
            dom.player.load();
            
            dom.btnVideo.classList.add('active'); 
            document.getElementById('txtVideo').innerText = 'Ready';
            filesReady.v = true;
        } else if (f.name.endsWith('.srt') || f.name.endsWith('.json')) {
            const r = new FileReader();
            r.onload = () => {
                state.subtitles = f.name.endsWith('.json') ? JSON.parse(r.result) : parseSRT(r.result);
                renderTranscript();
                dom.btnSub.classList.add('active'); 
                document.getElementById('txtSub').innerText = 'Ready';
                filesReady.s = true;
                checkReady();
            };
            r.readAsText(f);
        }
    });
    checkReady();
}

document.getElementById('videoInput').addEventListener('change', e => handleFiles(e.target.files));
document.getElementById('subtitleInput').addEventListener('change', e => handleFiles(e.target.files));
document.body.addEventListener('dragover', e => e.preventDefault());
document.body.addEventListener('drop', e => { e.preventDefault(); handleFiles(e.dataTransfer.files); });

renderVocab();
</script>
